name: Claude PR Review (on comment)

on:
  issue_comment:
    types: [created]

jobs:
  review:
    runs-on: ubuntu-latest
    if: >-
      github.event.issue.pull_request != null &&
      contains(toLower(github.event.comment.body), 'claude') &&
      github.event.sender.type != 'Bot'
    permissions:
      pull-requests: write
      contents: read
      issues: write
    steps:
      - name: React to comment (acknowledge)
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: 'eyes',
            });

      - name: Determine review mode
        id: mode
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.comment.body || '';
            const mode = body.toLowerCase().includes('claude init review') ? 'full' : 'diff';
            core.setOutput('mode', mode);
            console.log(`Review mode: ${mode}`);

      - name: Call Claude review API
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST "${{ secrets.REVIEW_API_URL }}/review-pr" \
            -H "Content-Type: application/json" \
            -H "x-api-secret: ${{ secrets.REVIEW_API_SECRET }}" \
            -d "{\"repo\":\"${{ github.repository }}\",\"pr_number\":${{ github.event.issue.number }},\"github_token\":\"${{ secrets.GITHUB_TOKEN }}\",\"force\":true,\"review_mode\":\"${{ steps.mode.outputs.mode }}\"}")

          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | head -n -1)

          echo "HTTP status: $HTTP_CODE"
          echo "Response: $BODY"

          if [ "$HTTP_CODE" != "200" ]; then
            echo "Review API failed with status $HTTP_CODE"
            exit 1
          fi
