name: Claude PR Review
description: Review a Pull Request using Claude CLI via a self-hosted API server
author: sotatek

inputs:
  api-url:
    description: URL of the claude-pr-review server (e.g. http://13.250.120.160)
    required: true
  api-secret:
    description: x-api-secret header value configured on the server
    required: true
  github-token:
    description: GitHub token used to fetch PR diff and post comments
    required: true
    default: ${{ github.token }}
  timeout:
    description: Max seconds to wait for the review API (default 180)
    required: false
    default: "180"

outputs:
  review:
    description: The review text returned by Claude
    value: ${{ steps.call-api.outputs.review }}

runs:
  using: composite
  steps:
    - name: Call review API
      id: call-api
      shell: bash
      env:
        API_URL: ${{ inputs.api-url }}
        API_SECRET: ${{ inputs.api-secret }}
        GITHUB_TOKEN: ${{ inputs.github-token }}
        TIMEOUT: ${{ inputs.timeout }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
      run: ${{ github.action_path }}/scripts/call-api.sh

    - name: Post comment
      uses: actions/github-script@v7
      env:
        REVIEW: ${{ steps.call-api.outputs.review }}
        DURATION: ${{ steps.call-api.outputs.duration }}
      with:
        github-token: ${{ inputs.github-token }}
        script: |
          const { REVIEW, DURATION } = process.env;

          const body = [
            '## 🤖 Claude PR Review',
            '',
            REVIEW,
            '',
            '---',
            `*Generated by [Claude CLI](https://claude.ai/code) in ${DURATION}*`,
          ].join('\n');

          const { data: comments } = await github.rest.issues.listComments({
            ...context.repo,
            issue_number: context.issue.number,
          });

          // Replace previous bot review if exists
          const prev = comments.find(
            c => c.user.type === 'Bot' && c.body.startsWith('## 🤖 Claude PR Review')
          );

          if (prev) {
            await github.rest.issues.updateComment({
              ...context.repo,
              comment_id: prev.id,
              body,
            });
          } else {
            await github.rest.issues.createComment({
              ...context.repo,
              issue_number: context.issue.number,
              body,
            });
          }
